name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test "src/webapi/cnt_sp_webapi/7 Tests/SP.WebApi.Tests/SP.WebApi.Tests.csproj" --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/cnt_sp_web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenSpec
        run: npm install

      - name: Validate specs
        run: npx openspec validate --specs --strict --no-interactive

      - name: Validate active changes
        run: npx openspec validate --changes --strict --no-interactive

  likec4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install LikeC4
        run: npm install likec4 --no-save

      - name: Validate C4 models
        run: npx likec4 validate docs/architecture/diagram
