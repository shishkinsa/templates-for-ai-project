services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: sp-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:latest
    container_name: sp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:latest
    container_name: sp-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:latest
    container_name: sp-tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/config.yml:ro
    ports:
      - "3200:3200"
      - "4319:4317"

  grafana:
    image: grafana/grafana:latest
    container_name: sp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

networks:
  default:
    name: sp_monitoring_network
